<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커멘드에스 | 임밍아웃 카드</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    .baby-icon { animation: gentle-bounce 2.5s ease-in-out infinite; }
    @keyframes gentle-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .fade-in { animation: fade-in-up 0.7s ease-out forwards; opacity: 0; }
    @keyframes fade-in-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .announcement-card { background: linear-gradient(160deg, #FFFBFE 0%, #FFF0F6 25%, #F5F0FF 50%, #EEF2FF 75%, #FFF5F7 100%); position: relative; overflow: hidden; border: 1px solid #F3E8FF; }
    .selected-btn { background: linear-gradient(135deg, #A78BFA 0%, #F472B6 100%) !important; color: white !important; border-color: transparent !important; }
    .step-indicator .active { background: linear-gradient(135deg, #A78BFA, #F472B6); width: 28px; border-radius: 5px; }
  </style>
</head>
<body class="h-full font-['Noto_Sans_KR'] bg-[#FEFBFF]">

  <div id="app-wrapper" class="h-full w-full overflow-auto">
    
    <div id="create-view" class="hidden w-full min-h-full flex flex-col items-center py-8 px-4">
      <div class="w-full max-w-md">
        <div class="text-center mb-8 fade-in">
          <div class="baby-icon text-5xl mb-3">👶</div>
          <h1 class="text-2xl font-bold mb-2 text-[#7C3AED]" style="font-family: 'Gowun Batang', serif;">우리 가족이 찾아와요</h1>
          <p class="text-sm text-[#A78BFA]">특별한 임밍아웃 카드를 만들어보세요 ✨</p>
        </div>

        <div id="step-1" class="fade-in bg-white rounded-3xl p-6 shadow-sm border border-[#F3E8FF]">
          <h2 class="font-bold text-[#6B21A8] mb-5 flex items-center gap-2">🍼 정보 입력</h2>
          
          <div class="mb-4">
            <label class="block text-sm font-medium mb-2 text-[#7C3AED]">태명</label>
            <input type="text" id="input-baby-name" placeholder="예: 복덩이" class="w-full px-4 py-3 rounded-xl border-2 border-[#E9D5FF] outline-none">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium mb-2 text-[#7C3AED]">이벤트 대상 (중복 선택)</label>
            <div class="flex flex-wrap gap-2 mb-2" id="recipient-btns">
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">할머니</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">할아버지</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">이모</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">삼촌</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">고모</button>
            </div>
            <input type="text" id="input-custom-recipient" placeholder="직접 입력" class="w-full px-4 py-3 rounded-xl border-2 border-[#E9D5FF] outline-none">
          </div>

          <div class="mb-6">
            <label class="block text-sm font-medium mb-2 text-[#7C3AED]">출산 예정월</label>
            <div class="grid grid-cols-4 gap-2" id="month-btns"></div>
          </div>

          <button id="go-to-step2" class="w-full py-4 rounded-2xl text-white font-bold bg-[#A78BFA]">다음으로 →</button>
        </div>

        <div id="step-2" class="hidden fade-in bg-white rounded-3xl p-6 shadow-sm border border-[#F3E8FF]">
          <h2 class="font-bold text-[#6B21A8] mb-5">🎬 영상 추가</h2>
          
          <div class="grid grid-cols-2 gap-3 mb-6">
            <button id="btn-mode-url" class="py-3 rounded-xl text-sm font-medium bg-[#A78BFA] text-white">유튜브 주소</button>
            <button id="btn-mode-file" class="py-3 rounded-xl text-sm font-medium border-2 border-[#E9D5FF] text-[#7C3AED]">직접 업로드</button>
          </div>

          <div id="url-input-area" class="mb-6">
            <input type="text" id="input-video-url" placeholder="https://youtube.com/..." class="w-full px-4 py-3 rounded-xl border-2 border-[#E9D5FF] outline-none">
            <p class="text-[10px] text-[#A78BFA] mt-2">💡 유튜브 영상을 쓰면 가족들에게 공유하기가 좋습니다.</p>
          </div>

          <div id="file-input-area" class="hidden mb-6">
            <input type="file" id="input-video-file" accept="video/*" class="hidden">
            <button onclick="document.getElementById('input-video-file').click()" class="w-full py-8 border-2 border-dashed border-[#E9D5FF] rounded-2xl text-[#A78BFA] text-sm">
              <i data-lucide="upload" class="mx-auto mb-2"></i>
              폰에서 영상 선택하기
            </button>
            <p id="file-name" class="text-center text-xs text-[#7C3AED] mt-2"></p>
          </div>

          <div class="flex gap-3">
            <button id="back-to-step1" class="flex-1 py-4 border-2 border-[#E9D5FF] text-[#7C3AED] rounded-2xl">이전</button>
            <button id="btn-generate" class="flex-[2] py-4 rounded-2xl text-white font-bold bg-gradient-to-r from-[#A78BFA] to-[#F472B6]">카드 만들기 🎉</button>
          </div>
        </div>
      </div>
    </div>

    <div id="card-view" class="hidden w-full min-h-full flex flex-col items-center py-8 px-4">
      <div class="w-full max-w-md">
        <div class="announcement-card rounded-[2.5rem] p-8 shadow-xl mb-6 text-center border-4 border-white">
          <p id="view-recipient" class="text-sm text-[#A78BFA] mb-2"></p>
          <h2 class="text-2xl font-bold text-[#6B21A8] mb-6" style="font-family: 'Gowun Batang', serif;">우리 가족이 찾아와요</h2>
          
          <div id="video-container" class="hidden mb-6 rounded-2xl overflow-hidden shadow-lg bg-black aspect-video relative"></div>
          
          <div class="inline-block px-8 py-4 rounded-2xl bg-white/60 mb-6 border border-[#F3E8FF]">
            <p class="text-xs text-[#7C3AED] mb-1">사랑스러운 우리 아기</p>
            <p id="view-baby-name" class="text-3xl font-bold text-[#6B21A8]" style="font-family: 'Gowun Batang', serif;"></p>
          </div>
          
          <p id="view-due" class="text-lg text-[#7C3AED] font-bold mb-2"></p>
          <p class="text-[#C084FC] text-xs">사랑으로 기다리고 있어요 💕</p>
        </div>

        <div id="owner-controls" class="hidden">
          <div class="bg-white rounded-3xl p-6 shadow-md border border-[#F3E8FF] text-center mb-6">
            <h3 class="text-xs font-bold text-[#6B21A8] mb-4">QR코드로 소식 공유하기</h3>
            <div id="qrcode" class="flex justify-center mb-4"></div>
            <p class="text-[10px] text-[#A78BFA]">※ 직접 업로드한 영상은 QR에 포함되지 않으니 유튜브 링크를 권장합니다.</p>
          </div>
          <button onclick="location.href=location.pathname" class="w-full py-3 border-2 border-[#E9D5FF] text-[#7C3AED] rounded-xl">새로 만들기</button>
        </div>
        
        <div id="guest-controls" class="hidden text-center mt-4">
          <button onclick="location.href=location.pathname" class="w-full py-4 bg-white border-2 border-[#A78BFA] text-[#A78BFA] rounded-2xl font-bold">나도 이런 카드 만들기 ✨</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    let state = { babyName: '', recipients: [], month: '', vType: 'none', vSrc: '' };

    // 월 버튼 세팅
    const monthContainer = document.getElementById('month-btns');
    for(let i=1; i<=12; i++) {
      const btn = document.createElement('button');
      btn.className = "month-btn py-2 rounded-xl text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]";
      btn.innerText = `${i}월`;
      btn.onclick = () => {
        state.month = i;
        document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('selected-btn'));
        btn.classList.add('selected-btn');
      };
      monthContainer.appendChild(btn);
    }

    // 대상 다중 선택
    document.querySelectorAll('.recipient-btn').forEach(btn => {
      btn.onclick = () => {
        const name = btn.innerText;
        if(state.recipients.includes(name)) {
          state.recipients = state.recipients.filter(r => r !== name);
          btn.classList.remove('selected-btn');
        } else {
          state.recipients.push(name);
          btn.classList.add('selected-btn');
        }
      };
    });

    // 화면 전환
    document.getElementById('go-to-step2').onclick = () => {
      if(!document.getElementById('input-baby-name').value || !state.month) return alert('정보를 입력해주세요!');
      document.getElementById('step-1').classList.add('hidden');
      document.getElementById('step-2').classList.remove('hidden');
    };
    document.getElementById('back-to-step1').onclick = () => {
      document.getElementById('step-2').classList.add('hidden');
      document.getElementById('step-1').classList.remove('hidden');
    };

    // 영상 입력 방식 선택
    document.getElementById('btn-mode-url').onclick = () => {
      document.getElementById('url-input-area').classList.remove('hidden');
      document.getElementById('file-input-area').classList.add('hidden');
      document.getElementById('btn-mode-url').classList.add('bg-[#A78BFA]', 'text-white');
      document.getElementById('btn-mode-file').classList.remove('bg-[#A78BFA]', 'text-white');
      state.vType = 'url';
    };
    document.getElementById('btn-mode-file').onclick = () => {
      document.getElementById('url-input-area').classList.add('hidden');
      document.getElementById('file-input-area').classList.remove('hidden');
      document.getElementById('btn-mode-file').classList.add('bg-[#A78BFA]', 'text-white');
      document.getElementById('btn-mode-url').classList.remove('bg-[#A78BFA]', 'text-white');
      state.vType = 'file';
    };

    // 파일 업로드 처리
    document.getElementById('input-video-file').onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('file-name').innerText = `✅ 선택됨: ${file.name}`;
        const reader = new FileReader();
        reader.onload = (ev) => { state.vSrc = ev.target.result; };
        reader.readAsDataURL(file);
      }
    };

    // 카드 생성
    document.getElementById('btn-generate').onclick = () => {
      state.babyName = document.getElementById('input-baby-name').value;
      const customRec = document.getElementById('input-custom-recipient').value;
      const allRecipients = [...state.recipients];
      if(customRec) allRecipients.push(customRec);

      const url = document.getElementById('input-video-url').value;
      if(state.vType === 'url' && url) state.vSrc = url;

      const data = { n: state.babyName, r: allRecipients.join(', '), m: state.month, v: (state.vType === 'url' ? state.vSrc : '') };
      const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
      const shareUrl = `${window.location.origin}${window.location.pathname}?card=${encoded}`;

      renderCard({ ...data, vRaw: (state.vType === 'file' ? state.vSrc : '') });
      
      new QRCode(document.getElementById("qrcode"), { text: shareUrl, width: 140, height: 140, colorDark : "#6B21A8" });
      document.getElementById('owner-controls').classList.remove('hidden');
    };

    function renderCard(data) {
      document.getElementById('create-view').classList.add('hidden');
      document.getElementById('card-view').classList.remove('hidden');
      document.getElementById('view-recipient').innerText = `${data.r}님께 전하는 소식`;
      document.getElementById('view-baby-name').innerText = data.n;
      document.getElementById('view-due').innerText = `✨ ${data.m}월에 만나요! 🎀`;

      const container = document.getElementById('video-container');
      container.innerHTML = '';
      
      if (data.vRaw) { // 직접 파일
        container.innerHTML = `<video src="${data.vRaw}" autoplay muted playsinline controls class="w-full h-full object-cover"></video>`;
        container.classList.remove('hidden');
      } else if (data.v) { // 유튜브
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = data.v.match(regExp);
        const vidId = (match && match[2].length === 11) ? match[2] : null;
        if (vidId) {
          container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&playlist=${vidId}&loop=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
          container.classList.remove('hidden');
        }
      }
    }

    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const cardData = urlParams.get('card');
      if (cardData) {
        try {
          const decoded = JSON.parse(decodeURIComponent(atob(cardData)));
          renderCard(decoded);
          document.getElementById('guest-controls').classList.remove('hidden');
        } catch (e) { document.getElementById('create-view').classList.remove('hidden'); }
      } else { document.getElementById('create-view').classList.remove('hidden'); }
      lucide.createIcons();
    };
  </script>
</body>
</html>
