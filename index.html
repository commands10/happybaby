<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커멘드에스 | 임밍아웃 카드</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    .baby-icon { animation: gentle-bounce 2.5s ease-in-out infinite; }
    @keyframes gentle-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .fade-in { animation: fade-in-up 0.7s ease-out forwards; opacity: 0; }
    @keyframes fade-in-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .announcement-card { background: linear-gradient(160deg, #FFFBFE 0%, #FFF0F6 25%, #F5F0FF 50%, #EEF2FF 75%, #FFF5F7 100%); position: relative; overflow: hidden; border: 1px solid #F3E8FF; }
    .selected-btn { background: linear-gradient(135deg, #A78BFA 0%, #F472B6 100%) !important; color: white !important; border-color: transparent !important; }
  </style>
</head>
<body class="h-full font-['Noto_Sans_KR'] bg-[#FEFBFF]">

  <div id="app-wrapper" class="h-full w-full overflow-auto">
    
    <div id="create-view" class="hidden w-full min-h-full flex flex-col items-center py-8 px-4">
      <div class="w-full max-w-md">
        <div class="text-center mb-8 fade-in">
          <div class="baby-icon text-5xl mb-3">👶</div>
          <h1 class="text-2xl font-bold mb-2 text-[#7C3AED]" style="font-family: 'Gowun Batang', serif;">우리 가족이 찾아와요</h1>
          <div class="flex justify-center mb-4">
            <img src="image_1.png" alt="Baby Sheep" class="w-32 h-auto baby-icon" style="filter: drop-shadow(0 4px 6px rgba(124, 58, 237, 0.2));">
          </div>
          <p class="text-sm text-[#A78BFA]">특별한 임밍아웃 카드를 만들어보세요 ✨</p>
        </div>

        <div id="step-1" class="fade-in bg-white rounded-3xl p-6 shadow-sm border border-[#F3E8FF]">
          <h2 class="font-bold text-[#6B21A8] mb-5">🍼 정보 입력</h2>
          <div class="mb-4">
            <label class="block text-xs font-bold mb-2 text-[#7C3AED]">태명</label>
            <input type="text" id="input-baby-name" placeholder="예: 복덩이" class="w-full px-4 py-3 rounded-xl border-2 border-[#E9D5FF] outline-none">
          </div>
          <div class="mb-4">
            <label class="block text-xs font-bold mb-2 text-[#7C3AED]">이벤트 대상</label>
            <div class="flex flex-wrap gap-2 mb-2" id="recipient-btns">
              <button class="recipient-btn px-4 py-2 rounded-full text-xs border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">할머니</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-xs border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">할아버지</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-xs border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">이모</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-xs border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">삼촌</button>
            </div>
            <input type="text" id="input-custom-recipient" placeholder="직접 입력" class="w-full px-4 py-3 rounded-xl border-2 border-[#E9D5FF] outline-none text-sm">
          </div>
          <div class="mb-6">
            <label class="block text-xs font-bold mb-2 text-[#7C3AED]">출산 예정월</label>
            <div class="grid grid-cols-4 gap-2" id="month-btns"></div>
          </div>
          <div class="mb-6">
            <label class="block text-xs font-bold mb-2 text-[#7C3AED]">YouTube 주소</label>
            <input type="text" id="input-video-url" placeholder="https://youtube.com/..." class="w-full px-4 py-3 rounded-xl border-2 border-[#E9D5FF] outline-none text-sm">
          </div>
          <button id="btn-generate" class="w-full py-4 rounded-2xl text-white font-bold bg-gradient-to-r from-[#A78BFA] to-[#F472B6] shadow-lg">카드 완성하기 🎉</button>
        </div>
      </div>
    </div>

    <div id="card-view" class="hidden w-full min-h-full flex flex-col items-center py-8 px-4">
      <div class="w-full max-w-md">
        <div class="announcement-card rounded-[2.5rem] p-8 shadow-xl mb-6 text-center border-4 border-white">
          <p id="view-recipient" class="text-sm text-[#A78BFA] mb-2 font-medium"></p>
          <h2 class="text-2xl font-bold text-[#6B21A8] mb-4" style="font-family: 'Gowun Batang', serif;">우리 가족이 찾아와요</h2>
          
          <div class="flex justify-center mb-6">
            <img src="image_1.png" alt="Baby Sheep" class="w-32 h-auto baby-icon" style="filter: drop-shadow(0 4px 6px rgba(107, 33, 168, 0.2));">
          </div>

          <div id="video-container" class="hidden mb-6 rounded-2xl overflow-hidden shadow-lg bg-black aspect-video"></div>
          
          <div class="inline-block px-8 py-4 rounded-2xl bg-white/60 mb-6 border border-[#F3E8FF]">
            <p id="view-baby-name" class="text-3xl font-bold text-[#6B21A8]" style="font-family: 'Gowun Batang', serif;"></p>
          </div>
          <p id="view-due" class="text-lg text-[#7C3AED] font-bold"></p>
        </div>

        <div id="owner-controls" class="hidden">
          <div class="bg-white rounded-3xl p-6 shadow-md border border-[#F3E8FF] text-center mb-6">
            <h3 class="text-xs font-bold text-[#6B21A8] mb-4">가족들에게 공유할 QR 코드</h3>
            <div id="qrcode" class="flex justify-center mb-4 p-2 bg-white inline-block border border-gray-100"></div>
            
            <div class="flex flex-col gap-2">
              <button id="btn-copy-qr" class="w-full py-3 bg-[#F5F0FF] text-[#7C3AED] rounded-xl text-sm font-bold flex items-center justify-center gap-2">
                <i data-lucide="copy" class="w-4 h-4"></i> QR 이미지 복사하기
              </button>
              <p class="text-[10px] text-[#A78BFA]">복사가 안 된다면 QR을 길게 눌러 저장해 주세요!</p>
            </div>
          </div>
          <button onclick="location.href=location.pathname" class="w-full py-3 border-2 border-[#E9D5FF] text-[#7C3AED] rounded-xl text-sm font-medium">새로 만들기</button>
        </div>
        
        <div id="guest-controls" class="hidden text-center mt-4">
          <button onclick="location.href=location.pathname" class="w-full py-4 bg-white border-2 border-[#A78BFA] text-[#A78BFA] rounded-2xl font-bold">나도 임밍아웃 카드 만들기 ✨</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = { babyName: '', recipients: [], month: '', vUrl: '' };

    // UI 초기화
    const monthContainer = document.getElementById('month-btns');
    for(let i=1; i<=12; i++) {
      const btn = document.createElement('button');
      btn.className = "month-btn py-2 rounded-xl text-xs border-2 border-[#E9D5FF] bg-white text-[#6B21A8]";
      btn.innerText = `${i}월`;
      btn.onclick = () => {
        state.month = i;
        document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('selected-btn'));
        btn.classList.add('selected-btn');
      };
      monthContainer.appendChild(btn);
    }

    document.querySelectorAll('.recipient-btn').forEach(btn => {
      btn.onclick = () => {
        const name = btn.innerText;
        if(state.recipients.includes(name)) {
          state.recipients = state.recipients.filter(r => r !== name);
          btn.classList.remove('selected-btn');
        } else {
          state.recipients.push(name);
          btn.classList.add('selected-btn');
        }
      };
    });

    // 카드 생성 및 QR 생성
    document.getElementById('btn-generate').onclick = async () => {
      state.babyName = document.getElementById('input-baby-name').value;
      state.vUrl = document.getElementById('input-video-url').value;
      const customRec = document.getElementById('input-custom-recipient').value;
      const allRecs = [...state.recipients];
      if(customRec) allRecs.push(customRec);

      if(!state.babyName || allRecs.length === 0 || !state.month) return alert('정보를 입력해주세요!');

      const data = { n: state.babyName, r: allRecs.join(', '), m: state.month, v: state.vUrl };
      const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
      const shareUrl = `${window.location.origin}${window.location.pathname}?card=${encoded}`;

      renderCard(data);
      
      const qrDiv = document.getElementById("qrcode");
      qrDiv.innerHTML = "";
      new QRCode(qrDiv, { text: shareUrl, width: 160, height: 160, colorDark : "#6B21A8" });
      
      document.getElementById('owner-controls').classList.remove('hidden');
    };

    // QR 코드 복사 함수 (핵심 기능)
    document.getElementById('btn-copy-qr').onclick = async () => {
      const qrDiv = document.getElementById('qrcode');
      // QRCode.js는 브라우저에 따라 canvas 혹은 img를 생성합니다.
      const canvas = qrDiv.querySelector('canvas');
      const img = qrDiv.querySelector('img');
      
      try {
        let blob;
        if (canvas) {
          blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        } else if (img) {
          const response = await fetch(img.src);
          blob = await response.blob();
        }

        const data = [new ClipboardItem({ 'image/png': blob })];
        await navigator.clipboard.write(data);
        alert('QR 코드가 복사되었습니다! 카카오톡 대화창에 붙여넣기(Ctrl+V) 해보세요.');
      } catch (err) {
        console.error(err);
        alert('복사 기능을 지원하지 않는 브라우저입니다. 이미지를 길게 눌러 저장해 주세요!');
      }
    };

    function renderCard(data) {
      document.getElementById('create-view').classList.add('hidden');
      document.getElementById('card-view').classList.remove('hidden');
      document.getElementById('view-recipient').innerText = `${data.r}님께 전하는 소식`;
      document.getElementById('view-baby-name').innerText = data.n;
      document.getElementById('view-due').innerText = `✨ ${data.m}월에 만나요! 🎀`;

      if (data.v) {
        const container = document.getElementById('video-container');
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = data.v.match(regExp);
        const vidId = (match && match[2].length === 11) ? match[2] : null;
        if (vidId) {
          container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&playlist=${vidId}&loop=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
          container.classList.remove('hidden');
        }
      }
    }

    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const cardData = urlParams.get('card');
      if (cardData) {
        try {
          const decoded = JSON.parse(decodeURIComponent(atob(cardData)));
          renderCard(decoded);
          document.getElementById('guest-controls').classList.remove('hidden');
        } catch (e) { document.getElementById('create-view').classList.remove('hidden'); }
      } else { document.getElementById('create-view').classList.remove('hidden'); }
      lucide.createIcons();
    };
  </script>
</body>
</html>
