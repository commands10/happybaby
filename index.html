<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커멘드에스 | 임밍아웃 카드</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Single+Day&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Single Day', cursive; }
    .font-cute { font-family: 'Gaegu', cursive; }
    .baby-icon { animation: gentle-bounce 2.5s ease-in-out infinite; }
    @keyframes gentle-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .fade-in { animation: fade-in-up 0.7s ease-out forwards; opacity: 0; }
    @keyframes fade-in-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .announcement-card { background: linear-gradient(160deg, #FFFBFE 0%, #FFF0F6 25%, #F5F0FF 50%, #EEF2FF 75%, #FFF5F7 100%); position: relative; overflow: hidden; border: 1px solid #F3E8FF; }
    .selected-btn { background: linear-gradient(135deg, #A78BFA 0%, #F472B6 100%) !important; color: white !important; border-color: transparent !important; box-shadow: 0 4px 12px rgba(167, 139, 250, 0.3); }
  </style>
</head>
<body class="h-full bg-[#FEFBFF]">

  <div id="app-wrapper" class="h-full w-full overflow-auto">
    
    <div id="create-view" class="hidden w-full min-h-full flex flex-col items-center py-8 px-4">
      <div class="w-full max-w-md text-center">
        <div class="mb-6 fade-in pt-4">
          <h1 class="text-3xl font-bold mb-2 text-[#7C3AED] font-cute">우리 가족이 찾아와요</h1>
          <div class="flex justify-center mb-4">
            <img src="image2.png" alt="Baby Sheep" class="w-28 h-auto baby-icon" style="filter: drop-shadow(0 4px 6px rgba(124, 58, 237, 0.2));">
          </div>
          <p class="text-xs text-[#A78BFA]">소중한 소식을 담은 특별한 카드 ✨</p>
        </div>

        <div class="fade-in bg-white rounded-[2rem] p-6 shadow-sm border border-[#F3E8FF] space-y-6 text-left">
          <div>
            <label class="block text-xs font-bold mb-2 text-[#7C3AED]">아기 태명</label>
            <input type="text" id="input-baby-name" placeholder="예: 토담이" class="w-full px-4 py-3 rounded-xl border-2 border-[#E9D5FF] outline-none focus:border-[#C084FC] text-lg">
          </div>

          <div>
            <label class="block text-xs font-bold mb-2 text-[#7C3AED]">소식을 전할 가족 (중복 선택)</label>
            <div class="flex flex-wrap gap-2 mb-3" id="recipient-btns">
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">할머니</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">할아버지</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">이모</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">삼촌</button>
              <button class="recipient-btn px-4 py-2 rounded-full text-sm border-2 border-[#E9D5FF] bg-white text-[#6B21A8]">고모</button>
            </div>
            <input type="text" id="input-custom-recipient" placeholder="직접 입력창" class="w-full px-4 py-3 rounded-xl border-2 border-[#E9D5FF] outline-none text-sm font-medium">
          </div>

          <div>
            <label class="block text-xs font-bold mb-2 text-[#7C3AED]">출산 예정월</label>
            <div class="grid grid-cols-4 gap-2" id="month-btns"></div>
          </div>

          <div>
            <label class="block text-xs font-bold mb-2 text-[#7C3AED]">영상 추가 (선택)</label>
            <div class="grid grid-cols-2 gap-2 mb-3">
              <button id="mode-url" class="py-2 rounded-xl text-xs font-bold bg-[#A78BFA] text-white">유튜브 URL</button>
              <button id="mode-file" class="py-2 rounded-xl text-xs font-bold border-2 border-[#E9D5FF] text-[#7C3AED]">파일 업로드</button>
            </div>
            <div id="area-url">
              <input type="text" id="input-video-url" placeholder="YouTube 주소를 붙여넣으세요" class="w-full px-4 py-3 rounded-xl border-2 border-[#E9D5FF] outline-none text-sm">
            </div>
            <div id="area-file" class="hidden text-center">
              <input type="file" id="input-video-file" accept="video/*" class="hidden">
              <button onclick="document.getElementById('input-video-file').click()" class="w-full py-6 border-2 border-dashed border-[#E9D5FF] rounded-xl text-[#A78BFA] text-xs flex flex-col items-center">
                <i data-lucide="upload" class="mb-1"></i> 영상 파일 선택
              </button>
              <p id="file-name" class="text-[10px] text-[#7C3AED] mt-1 font-bold"></p>
              <p class="text-[9px] text-[#A78BFA] mt-1">* 파일 업로드는 임시 미리보기만 가능합니다.<br>가족 공유를 위해서는 유튜브 URL을 권장합니다.</p>
            </div>
          </div>

          <button id="btn-generate" class="w-full py-4 rounded-[2rem] text-white text-xl font-bold bg-gradient-to-r from-[#A78BFA] to-[#F472B6] shadow-lg text-lg transform hover:-translate-y-0.5 transition-all">카드 완성하기 ✨</button>
        </div>
      </div>
    </div>

    <div id="card-view" class="hidden w-full min-h-full flex flex-col items-center py-8 px-4">
      <div class="w-full max-w-md">
        <div class="announcement-card rounded-[3rem] p-10 shadow-xl mb-6 text-center border-4 border-white relative">
          
          <div id="view-letter" class="mb-8 px-2">
            <p class="text-2xl font-bold text-[#6B21A8] leading-relaxed font-cute">
              "<span id="res-target" class="text-[#F472B6] font-bold"></span>",<br>
              저 "<span id="res-baby" class="text-[#F472B6] font-bold"></span>"이에요~<br><br>
              많이 기다리셨죠?<br>
              보고싶었었어요~<br>
              우리 <span id="res-month" class="text-[#F472B6] font-bold"></span>월에 봬요🧡
            </p>
          </div>
          
          <div class="flex justify-center mb-8">
            <img src="image2.png" alt="Baby Sheep" class="w-36 h-auto baby-icon" style="filter: drop-shadow(0 6px 10px rgba(107, 33, 168, 0.2));">
          </div>

          <div id="video-container" class="hidden mb-8 rounded-[2rem] overflow-hidden shadow-lg bg-black aspect-video relative"></div>
          
          <div class="inline-block px-10 py-4 rounded-[2rem] bg-white/70 border border-[#F3E8FF]">
             <p class="text-3xl font-bold text-[#6B21A8] font-cute" id="final-baby-name"></p>
          </div>
          <p class="text-[#C084FC] text-[10px] mt-8 leading-tight">커멘드에스와 함께하는 특별한 기록 💕</p>
        </div>

        <div id="owner-controls" class="hidden">
          <div class="bg-white rounded-[2.5rem] p-8 shadow-md border border-[#F3E8FF] text-center mb-6 space-y-4">
            <h3 class="text-sm font-bold text-[#6B21A8]">✨ 가족들에게 카드 보내기</h3>
            
            <button id="btn-copy-link" class="w-full py-4 bg-[#F5F0FF] text-[#7C3AED] rounded-2xl text-base font-bold flex items-center justify-center gap-2 hover:bg-[#A78BFA] hover:text-white transition-all">
              <i data-lucide="link" class="w-5 h-5"></i> 링크 복사하기
            </button>
            <p class="text-[10px] text-[#A78BFA] leading-tight">위 버튼을 눌러 링크를 복사한 뒤,<br>카카오톡이나 문자로 가족들에게 전달해 보세요!</p>
          </div>
          <button onclick="location.href=location.pathname" class="w-full py-4 border-2 border-[#E9D5FF] text-[#7C3AED] rounded-2xl font-bold bg-white hover:bg-gray-50 transition-all">새로 만들기</button>
        </div>

      </div>
    </div>
  </div>

  <script>
    let state = { babyName: '', recipients: [], month: '', vType: 'url', vSrc: '', currentShareUrl: '' };

    // UI 초기화
    const monthContainer = document.getElementById('month-btns');
    for(let i=1; i<=12; i++) {
      const btn = document.createElement('button');
      btn.className = "month-btn py-2 rounded-xl text-xs border-2 border-[#E9D5FF] bg-white text-[#6B21A8]";
      btn.innerText = `${i}월`;
      btn.onclick = () => {
        state.month = i;
        document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('selected-btn'));
        btn.classList.add('selected-btn');
      };
      monthContainer.appendChild(btn);
    }

    document.querySelectorAll('.recipient-btn').forEach(btn => {
      btn.onclick = () => {
        const name = btn.innerText;
        if(state.recipients.includes(name)) {
          state.recipients = state.recipients.filter(r => r !== name);
          btn.classList.remove('selected-btn');
        } else {
          state.recipients.push(name);
          btn.classList.add('selected-btn');
        }
      };
    });

    document.getElementById('mode-url').onclick = () => {
      state.vType = 'url';
      document.getElementById('area-url').classList.remove('hidden');
      document.getElementById('area-file').classList.add('hidden');
      document.getElementById('mode-url').classList.add('bg-[#A78BFA]', 'text-white');
      document.getElementById('mode-file').classList.remove('bg-[#A78BFA]', 'text-white');
    };
    document.getElementById('mode-file').onclick = () => {
      state.vType = 'file';
      document.getElementById('area-file').classList.remove('hidden');
      document.getElementById('area-url').classList.add('hidden');
      document.getElementById('mode-file').classList.add('bg-[#A78BFA]', 'text-white');
      document.getElementById('mode-url').classList.remove('bg-[#A78BFA]', 'text-white');
    };

    document.getElementById('input-video-file').onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('file-name').innerText = `✅ 선택됨: ${file.name}`;
        const reader = new FileReader();
        reader.onload = (ev) => { state.vSrc = ev.target.result; };
        reader.readAsDataURL(file);
      }
    };

    // 카드 생성
    document.getElementById('btn-generate').onclick = async () => {
      state.babyName = document.getElementById('input-baby-name').value;
      const vUrl = document.getElementById('input-video-url').value;
      const customRec = document.getElementById('input-custom-recipient').value;
      const allRecs = [...state.recipients];
      if(customRec) allRecs.push(customRec);

      if(!state.babyName || allRecs.length === 0 || !state.month) return alert('정보를 모두 입력해주세요!');

      // 공유용 데이터 인코딩 (파일 업로드 시 vSrc는 제외하여 QR 용량 최적화)
      const data = { n: state.babyName, r: allRecs.join(', '), m: state.month, v: (state.vType === 'url' ? vUrl : '') };
      const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
      state.currentShareUrl = `${window.location.origin}${window.location.pathname}?card=${encoded}`;

      // 결과 화면 렌더링 (파일 업로드 시에만 vRaw 전달하여 로컬 자동 재생 보장)
      renderCard({ ...data, vRaw: (state.vType === 'file' ? state.vSrc : '') });
      
      document.getElementById('owner-controls').classList.remove('hidden');
      window.scrollTo(0,0);
    };

    // 링크 복사하기 기능
    document.getElementById('btn-copy-link').onclick = async () => {
      try {
        await navigator.clipboard.writeText(state.currentShareUrl);
        alert('링크가 복사되었습니다! 카톡에 붙여넣어 보세요 💖');
      } catch (err) {
        // 구형 브라우저 대응
        const textArea = document.createElement("textarea");
        textArea.value = state.currentShareUrl;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        alert('링크가 복사되었습니다! 카톡에 붙여넣어 보세요 💖');
      }
    };

    // 카드 렌더링 (자동 재생 최적화)
    function renderCard(data) {
      document.getElementById('create-view').classList.add('hidden');
      document.getElementById('card-view').classList.remove('hidden');
      
      document.getElementById('res-target').innerText = data.r;
      document.getElementById('res-baby').innerText = data.n;
      document.getElementById('res-month').innerText = data.m;
      document.getElementById('final-baby-name').innerText = data.n;

      const container = document.getElementById('video-container');
      container.innerHTML = '';
      if (data.vRaw) { // 직접 업로드한 파일 (로컬 미리보기)
        container.innerHTML = `<video src="${data.vRaw}" autoplay muted playsinline controls class="w-full h-full object-cover rounded-[2rem] shadow-inner"></video>`;
        container.classList.remove('hidden');
      } else if (data.v) { // 유튜브 URL
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = data.v.match(regExp);
        const vidId = (match && match[2].length === 11) ? match[2] : null;
        if (vidId) {
          container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&playlist=${vidId}&loop=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen class="rounded-[2rem]"></iframe>`;
          container.classList.remove('hidden');
        }
      } else {
        container.classList.add('hidden');
      }
    }

    // 주소 로딩 (viewer 모드)
    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const cardData = urlParams.get('card');
      if (cardData) {
        try {
          // 공유된 데이터는 vRaw(파일 Base64)가 없으므로 유튜브 iframe만 렌더링됨
          const decoded = JSON.parse(decodeURIComponent(atob(cardData)));
          renderCard(decoded);
          // 가족들에게는 사장님 전용 QR 공유 버튼을 숨김
          document.getElementById('owner-controls').classList.add('hidden'); 
        } catch (e) { document.getElementById('create-view').classList.remove('hidden'); }
      } else { 
        // 카드 만드는 페이지
        document.getElementById('create-view').classList.remove('hidden'); 
      }
      lucide.createIcons();
    };
  </script>
</body>
</html>
